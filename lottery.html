<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>手搖抽獎箱 - 網頁遊戲動畫</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans TC', system-ui, -apple-system, 'Roboto', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .game-container {
            background: #4e3b28;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            max-width: 95%;
            width: 100%;
            box-sizing: border-box;
            margin: auto;
        }

        .lottery-box {
            background: #e9c891;
            border-radius: 24px;
            padding: 8px;
            box-shadow: inset 0 0 0 4px #fef0cf, inset 0 0 0 8px #c2a15b, 0 8px 20px black;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            cursor: grab;
            background: #fdf8e7;
            max-width: 100%;
        }

        canvas:active {
            cursor: grabbing;
        }

        .info-panel {
            margin-top: 15px;
            background: #2c2418;
            border-radius: 30px;
            padding: 10px 15px;
            text-align: center;
        }

        .prize-label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #f5d98f;
            font-weight: 500;
        }

        .prize-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: #1f1910;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 30px;
            color: #ffecb3;
            margin: 5px 0;
        }

        .hint {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #dbbc7c;
            background: #1e1710;
            display: inline-block;
            padding: 4px 15px;
            border-radius: 20px;
        }

        button {
            display: none; /* Hide reset button in game mode */
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="lottery-box">
            <canvas id="lotteryCanvas" width="500" height="400" style="width:100%; height:auto; max-width:500px; aspect-ratio:500/400"></canvas>
        </div>
        <div class="info-panel">
            <div class="prize-label">✨ 本次抽中 ✨</div>
            <div class="prize-value" id="prizeDisplay">等待搖獎</div>
            <div class="hint">
                🎲 <i>往下拖拽</i> 用力轉動 → 鬆開即抽獎 🎁
            </div>
            <button id="resetTutorialBtn">🎰 重置 / 教學提示</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 抽獎箱動畫核心 ----------
        const canvas = document.getElementById('lotteryCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 500;
        canvas.height = 400;
        
        let fixedPrize = null;
        let isWin = false;
        let ballColor = "#f5c500"; // Default gold

        // Listen for prize from parent
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SET_PRIZE') {
                fixedPrize = event.data.prize;
                isWin = event.data.isWin;
                ballColor = isWin ? "#f5c500" : "#C0C0C0"; // Gold vs Silver
                console.log('Prize set to:', fixedPrize, 'Win:', isWin);
            }
        });

        function drawRandomPrize() {
            if (fixedPrize) return { name: fixedPrize, isWin: isWin };

            // Default fallback pool
            return { name: "⭐ 金幣 x50", isWin: true };
        }
        
        // ---------- 幾何參數 (符合 Garapon 造型) ----------
        const pivot = { x: 320, y: 170 };   
        const leverLength = 90;             
        const knobRadius = 15;              
        
        const MAX_ANGLE_DEG = 150;
        const MIN_ANGLE_DEG = -40;
        const MAX_ANGLE_RAD = MAX_ANGLE_DEG * Math.PI / 180;
        const MIN_ANGLE_RAD = MIN_ANGLE_DEG * Math.PI / 180;
        
        const TRIGGER_ANGLE_DEG = 40; 
        const TRIGGER_RAD = TRIGGER_ANGLE_DEG * Math.PI / 180;
        
        let currentAngle = 0.0;        
        let isDragging = false;         
        let isAnimating = false;        
        let showWinningBall = false;   
        
        let shakeOffsetX = 0;
        let shakeOffsetY = 0;
        
        let lastPrize = "✨ 快來搖一搖 ✨";
        const prizeDisplaySpan = document.getElementById('prizeDisplay');
        
        function updatePrizeUI(prizeText) {
            lastPrize = prizeText;
            prizeDisplaySpan.innerText = prizeText;
        }
        
        // ---------- 繪圖核心 ----------
        function drawGarapon(offsetX, offsetY, angleRad) {
            ctx.fillStyle = "#c88b28";
            ctx.fillRect(40 + offsetX, 320 + offsetY, 420, 20);
            ctx.fillStyle = "#9e6918";
            ctx.fillRect(40 + offsetX, 340 + offsetY, 420, 10);

            ctx.fillStyle = "#e8ecef";
            ctx.beginPath();
            ctx.moveTo(80 + offsetX, 295 + offsetY);
            ctx.lineTo(200 + offsetX, 295 + offsetY);
            ctx.lineTo(215 + offsetX, 320 + offsetY);
            ctx.lineTo(65 + offsetX, 320 + offsetY);
            ctx.fill();
            
            ctx.fillStyle = "#bac2c9";
            ctx.fillRect(65 + offsetX, 320 + offsetY, 150, 8);
            ctx.fillStyle = "#d0d6db";
            ctx.beginPath();
            ctx.moveTo(90 + offsetX, 300 + offsetY);
            ctx.lineTo(190 + offsetX, 300 + offsetY);
            ctx.lineTo(200 + offsetX, 315 + offsetY);
            ctx.lineTo(80 + offsetX, 315 + offsetY);
            ctx.fill();

            if (showWinningBall) {
                ctx.save();
                let bounceY = Math.sin(Date.now() * 0.008) * 4;
                ctx.beginPath();
                ctx.arc(140 + offsetX, 285 + offsetY + bounceY, 14, 0, Math.PI*2);
                ctx.fillStyle = ballColor; 
                ctx.fill();
                
                // Highlighting based on color
                ctx.fillStyle = isWin ? "#ffee88" : "#f0f0f0";
                ctx.beginPath();
                ctx.arc(135 + offsetX, 280 + offsetY + bounceY, 5, 0, Math.PI*2);
                ctx.fill();
                
                if (isWin) {
                    ctx.fillStyle = "#ffdd44";
                    ctx.font = "18px monospace";
                    ctx.fillText("✨", 105 + offsetX, 275 + offsetY + bounceY);
                    ctx.fillText("✨", 160 + offsetX, 270 + offsetY + bounceY);
                }
                ctx.restore();
            }

            ctx.save();
            ctx.translate(pivot.x + offsetX, pivot.y + offsetY);
            ctx.rotate(angleRad); 

            const radius = 120;
            const sides = 8; // 八邊形
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#8b5c24";
            for (let i = 0; i < sides; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                let a1 = i * Math.PI * 2 / sides;
                let a2 = (i + 1) * Math.PI * 2 / sides;
                ctx.lineTo(Math.cos(a1) * radius, Math.sin(a1) * radius);
                ctx.lineTo(Math.cos(a2) * radius, Math.sin(a2) * radius);
                ctx.closePath();
                ctx.fillStyle = (i % 2 === 0) ? "#dfbc72" : "#c69b4c";
                ctx.fill();
                ctx.stroke();
            }
// 木桶外框 (改為八邊形)
ctx.beginPath();
for (let i = 0; i < sides; i++) {
    let angle = i * Math.PI * 2 / sides;
    let x = Math.cos(angle) * radius;
    let y = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.lineWidth = 14;
ctx.strokeStyle = "#b88a44";
ctx.stroke();

ctx.beginPath();
for (let i = 0; i < sides; i++) {
    let angle = i * Math.PI * 2 / sides;
    let x = Math.cos(angle) * radius;
    let y = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.lineWidth = 6;
ctx.strokeStyle = "#8a6026";
ctx.stroke();

            ctx.save();
            ctx.rotate(Math.PI * 0.85); 
            ctx.beginPath();
            ctx.arc(radius - 20, 0, 16, 0, Math.PI*2);
            ctx.fillStyle = "#2c3338"; 
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#5a6875";
            ctx.stroke();
            
            ctx.fillStyle = "#7ca1c4";
            ctx.beginPath();
            ctx.moveTo(radius - 12, -8);
            ctx.lineTo(radius + 15, -12);
            ctx.lineTo(radius + 15, 12);
            ctx.lineTo(radius - 12, 8);
            ctx.fill();
            ctx.restore();

            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI*2);
            ctx.fillStyle = "#9e7131";
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.fillStyle = "#63707d"; 
            
            ctx.beginPath();
            ctx.arc(pivot.x, pivot.y, 24, Math.PI, 0); 
            ctx.lineTo(pivot.x + 40, 320); 
            ctx.lineTo(pivot.x + 15, 320);
            ctx.quadraticCurveTo(pivot.x, pivot.y + 45, pivot.x - 15, 320); 
            ctx.lineTo(pivot.x - 40, 320); 
            ctx.closePath();
            ctx.fill();

            ctx.lineWidth = 4;
            ctx.strokeStyle = "#4d5863";
            ctx.stroke();
            
            ctx.fillStyle = "#3e4852";
            ctx.fillRect(pivot.x - 50, 305, 25, 15);
            ctx.fillRect(pivot.x + 25, 305, 25, 15);
            ctx.restore();
        }
        
        function drawHandle(angleRad) {
            ctx.save();
            const handleX = pivot.x + Math.cos(angleRad) * leverLength;
            const handleY = pivot.y + Math.sin(angleRad) * leverLength;

            ctx.beginPath();
            ctx.moveTo(pivot.x, pivot.y);
            const cpX = pivot.x + Math.cos(angleRad - 0.4) * (leverLength * 0.6);
            const cpY = pivot.y + Math.sin(angleRad - 0.4) * (leverLength * 0.6);
            ctx.quadraticCurveTo(cpX, cpY, handleX, handleY);
            
            ctx.lineWidth = 14;
            ctx.strokeStyle = "#8da6bc"; 
            ctx.lineCap = "round";
            ctx.stroke();
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#a8bfd4"; 
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(pivot.x, pivot.y, 12, 0, Math.PI*2);
            ctx.fillStyle = "#4a5663";
            ctx.fill();

            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 6;
            ctx.shadowOffsetY = 4;
            ctx.beginPath();
            ctx.arc(handleX, handleY, knobRadius, 0, Math.PI*2);
            ctx.fillStyle = "#8a5732";
            ctx.fill();
            
            ctx.shadowColor = "transparent";
            ctx.beginPath();
            ctx.arc(handleX, handleY, knobRadius - 4, 0, Math.PI*2);
            ctx.fillStyle = "#a87146";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(handleX + 3, handleY - 3, 3, 0, Math.PI*2);
            ctx.fillStyle = "#d19a6d"; 
            ctx.fill();

            ctx.restore();
        }
        
        function drawSparkles(angleRad, isMoving) {
            if(!isMoving && !isDragging) return;
            const handleX = pivot.x + Math.cos(angleRad) * leverLength;
            const handleY = pivot.y + Math.sin(angleRad) * leverLength;
            ctx.save();
            for(let i=0; i<4; i++) {
                let offX = (Math.sin(Date.now() * 0.015 + i) * 3);
                let offY = (Math.cos(Date.now() * 0.017 + i*2) * 2);
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 200, 80, ${0.5+Math.sin(Date.now()*0.02)*0.3})`;
                ctx.arc(handleX + offX, handleY + offY, 2.5, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        function renderScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ebdbc0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0;i<200;i++) {
                ctx.fillStyle = `rgba(140, 90, 40, 0.05)`;
                ctx.fillRect(i*7, 0, 2, canvas.height);
            }
            
            drawGarapon(shakeOffsetX, shakeOffsetY, currentAngle);
            drawHandle(currentAngle);
            
            let isActive = (isDragging || isAnimating);
            drawSparkles(currentAngle, isActive);
        }
        
        function startPrizeShakeAndReset(prizeInfo) {
            if(isAnimating) return;
            isAnimating = true;
            const prizeName = prizeInfo.name;
            updatePrizeUI(prizeName); // 即時顯示結果
            
            const startTime = performance.now();
            const duration = 600;
            const startAngle = currentAngle;
            const targetAngle = 0;
            
            let shakeIntensity = 6;
            let ballDropped = false;

            function shakeAndReturnAnim(now) {
                const elapsed = now - startTime;
                let progress = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1-progress, 2);
                currentAngle = startAngle + (targetAngle - startAngle) * easeOut;
                
                let shakeAmount = (progress < 0.7) ? shakeIntensity * (1 - progress/0.7) : shakeIntensity * 0.2 * (1 - (progress-0.7)/0.3);
                shakeOffsetX = (Math.sin(now * 0.045) * shakeAmount);
                shakeOffsetY = (Math.cos(now * 0.063) * shakeAmount);
                
                // 動畫中途掉球
                if (progress > 0.4 && !ballDropped) {
                    showWinningBall = true;
                    ballDropped = true;
                }

                renderScene();
                
                if(progress < 1) {
                    requestAnimationFrame(shakeAndReturnAnim);
                } else {
                    currentAngle = 0;
                    shakeOffsetX = 0;
                    shakeOffsetY = 0;
                    isAnimating = false;
                    renderScene(); 
                    
                    // Notify parent that lottery is done
                    setTimeout(() => {
                        window.parent.postMessage({ type: 'LOTTERY_DONE', prize: prizeName }, '*');
                    }, 1500);
                }
            }
            requestAnimationFrame(shakeAndReturnAnim);
        }
        
        function resetHandleWithoutPrize() {
            if(isAnimating) return;
            isAnimating = true;
            const startAngle = currentAngle;
            const startTime = performance.now();
            const duration = 280;
            
            function resetAnim(now) {
                const elapsed = now - startTime;
                let progress = Math.min(1, elapsed / duration);
                currentAngle = startAngle + (0 - startAngle) * (1 - Math.pow(1-progress, 2));
                renderScene();
                if(progress < 1) {
                    requestAnimationFrame(resetAnim);
                } else {
                    currentAngle = 0;
                    isAnimating = false;
                    renderScene();
                }
            }
            requestAnimationFrame(resetAnim);
        }
        
        function tryTriggerLottery() {
            if(isAnimating) return false;
            if(currentAngle >= TRIGGER_RAD) {
                const prize = drawRandomPrize();
                startPrizeShakeAndReset(prize);
                return true;
            } else {
                resetHandleWithoutPrize();
                return false;
            }
        }
        
        function getHandleCenterPosition(angleRad) {
            return {
                x: pivot.x + Math.cos(angleRad) * leverLength,
                y: pivot.y + Math.sin(angleRad) * leverLength
            };
        }
        
        function isHitOnKnob(mouseX, mouseY, angleRad) {
            const handlePos = getHandleCenterPosition(angleRad);
            const dist = Math.hypot(mouseX - handlePos.x, mouseY - handlePos.y);
            return dist <= knobRadius + 12;
        }
        
        let dragStartAngle = 0;
        let startPointerAngle = 0;
        
        function onPointerDown(e) {
            e.preventDefault();
            if(isAnimating) return;
            const point = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            let mouseX = (point.clientX - rect.left) * (canvas.width / rect.width);
            let mouseY = (point.clientY - rect.top) * (canvas.height / rect.height);
            
            if(isHitOnKnob(mouseX, mouseY, currentAngle)) {
                isDragging = true;
                showWinningBall = false; 
                canvas.style.cursor = 'grabbing';
                dragStartAngle = currentAngle;
                startPointerAngle = Math.atan2(mouseY - pivot.y, mouseX - pivot.x);
                
                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                canvas.addEventListener('touchmove', onPointerMove, { passive: false });
                canvas.addEventListener('touchend', onPointerUp);
                canvas.addEventListener('touchcancel', onPointerUp);
            }
        }
        
        function onPointerMove(e) {
            if(!isDragging || isAnimating) return;
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            let mouseX = (point.clientX - rect.left) * (canvas.width / rect.width);
            let mouseY = (point.clientY - rect.top) * (canvas.height / rect.height);
            
            let currentPointerAngle = Math.atan2(mouseY - pivot.y, mouseX - pivot.x);
            let deltaAngle = currentPointerAngle - startPointerAngle;
            
            if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
            if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
            
            let newAngle = dragStartAngle + deltaAngle;
            newAngle = Math.min(MAX_ANGLE_RAD, Math.max(MIN_ANGLE_RAD, newAngle));
            currentAngle = newAngle;
            
            renderScene();
        }
        
        function onPointerUp(e) {
            if(!isDragging) return;
            isDragging = false;
            canvas.style.cursor = 'grab';
            window.removeEventListener('mousemove', onPointerMove);
            window.removeEventListener('mouseup', onPointerUp);
            canvas.removeEventListener('touchmove', onPointerMove);
            canvas.removeEventListener('touchend', onPointerUp);
            canvas.removeEventListener('touchcancel', onPointerUp);
            
            if(!isAnimating) {
                tryTriggerLottery();
            }
        }
        
        function resetTutorial() {
            if(isAnimating) return;
            showWinningBall = false;
            if(Math.abs(currentAngle) > 0.05) {
                resetHandleWithoutPrize();
            } else {
                startPrizeShakeAndReset("✨ 重置完成 ✨");
                setTimeout(()=>{
                    if(!isAnimating) {
                        showWinningBall = false;
                        updatePrizeUI(" 拖曳搖桿試手氣 ");
                        renderScene();
                    }
                }, 600);
            }
        }
        
        function bindEvents() {
            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('touchstart', onPointerDown, { passive: false });
            canvas.style.cursor = 'grab';
            document.getElementById('resetTutorialBtn').addEventListener('click', resetTutorial);
            
            function loop() {
                if(!isDragging && !isAnimating) {
                    renderScene();
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
        
        function init() {
            currentAngle = 0;
            isDragging = false;
            isAnimating = false;
            showWinningBall = false;
            renderScene();
            updatePrizeUI("拖曳搖桿試手氣");
            bindEvents();
        }
        
        init();
    })();
</script>
</body>
</html>
