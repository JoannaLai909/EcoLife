<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EcoLife Login</title>

    <link href="https://db.onlinewebfonts.com/c/b7c46534c8a2d55edd840bf49383777d?family=Ahkio-Regular" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-page">

        <div class="login-card">

            <h1>
                EcoLife Login
            </h1>

            <p class="login-subtitle">
                Enter your name and ID to begin your EcoLife journey.
            </p>

            <div class="input-group">

                <label for="userName">
                    Name
                </label>

                <input 
                    type="text" 
                    id="userName" 
                    placeholder="Enter your name"
                >

            </div>

            <div class="input-group">

                <label for="userId">
                    ID
                </label>

                <input 
                    type="text" 
                    id="userId" 
                    placeholder="Enter your ID"
                >

            </div>

            <p id="loginMessage" class="login-message"></p>

            <button id="loginBtn">
                Start
            </button>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
